# Recognise the 3 configured prefixes removing all, add, "urn:lsid:ipni.org:names:" to output
- title: "International Plant Names Index"
  alias: "IPNI"
  clbKey: "2006"
  datasetKey: "046bbc50-cae2-47ff-aa43-729fbf53f7c5"
  indexedPrefix: ""
  recognisedPrefixes:
    - "urn:lsid:ipni.org:names:"
    - "ipni:"
    - "https://www.ipni.org/n/"
  # the source data doesnt include the lsid prefix, so add it to output
  prefixToAddToOutput: "urn:lsid:ipni.org:names:"
  removePrefixForMatching: true

