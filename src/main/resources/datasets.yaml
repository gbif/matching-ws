# Recognise ids of the form gbif:1 = Animalia, strip the prefix for matching.
- title: "GBIF Backbone Taxonomy"
  alias: "GBIF"
  clbKey: "53147"
  datasetKey: "d7dddbf4-2cf0-4f39-9b2a-bb099caae36c"
  indexedPrefix: ""
  recognisedPrefixes:
    - "gbif:"
    - "https?://www.gbif.org/species/1"
  prefixToAddToOutput: "https://www.gbif.org/species/"
  removePrefixForMatching: true

